<!DOCTYPE html>
<html>
	<head>
		<title>MTG Visualizer</title>
		<link rel="icon" type="image/png" href="mtg-favicon.png">
		<script src="api-manager.js"></script>
		<script src="board-data.js"></script>
		<script src="main.js"></script>
	</head>

	<style type="text/css">
		li { width: auto; margin-bottom: 0.1rem;}
		li:hover {cursor: grab;}
		button { padding-top: 0.3rem; padding-bottom: 0.3rem; margin-top: 0.2rem; margin-bottom: 0.2rem; }
	</style>

	<body style="color: #aaa1dc; background-color: #0F181D; font-family: math; margin: 1rem;">
		<h1>Deck visualizer</h1>
		<p>Add your full deck and interact with it</p>

		<div style="display: flex; flex-direction: row;">

			<div style="width: 250px; margin-right: 1rem; margin-left: 1rem;">
				<h2> - Deck - </h2>
				<div style="display: flex; flex-direction: column; align-items: center;">
					<textarea id="library" style="width: 250px; height: 26rem;  margin: 1rem;"></textarea>
					<button style="height: 100%;" onclick="generateDeck()" >Update deck</button>
				</div>

				<p id="log" style="background-color: black; color: white; padding: 0.2rem;">[no action]</p>
			</div>

			<div style="width: 250px; margin-right: 1rem; margin-left: 1rem;">
				<h2> - Hand - </h2>
				<ul id="hand" style="display: flex; flex-direction: column;"></ul>
			</div>

			<div style="width: 150px; display: flex; flex-direction: column; margin-right: 1rem; margin-left: 1rem;">
				<h2> - Actions - </h2>
				<button onclick="fullDraw()">Draw all</button>
				<button onclick="draw(7)">Draw 7</button>
				<button onclick="draw(1)">Draw 1</button>
				<button onclick="draw(2)">Draw 2</button>
				<button onclick="shuffle()">Shuffle</button>
				<button onclick="draw(10)">Draw 10</button>
			</div>

			<div style="margin-right: 1rem; margin-left: 1rem;">
				<h2> - Card preview - </h2>
				<img
					id="hoverCardIMG"
					src="https://gatherer.wizards.com/Handlers/Image.ashx?multiverseid=0&type=card"
					height="550px"
					style="border-radius: 20px;"/>
			</div>

		</div>
	</body>

</html>
